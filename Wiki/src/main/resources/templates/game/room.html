<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게임룸</title>
    <link th:href="@{/css/room.css}" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <div class="background-wrapper">
      <img th:src="@{/img/wiki-image.jpg}" alt="배경 이미지" class="bg-img" />
    </div>
    <div class="game-board">
      <div class="player-area cpu-area">
        <div class="status-bar">
          <div>
            CPU Deck: <span id="cpuDeckCount">0</span>장 |
            <button
              onclick="openCemetery('CPU')"
              style="
                background: #444444;
                color: #fff;
                border: 1px solid #777777;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
                margin-left: 10px;
              "
            >
              묘지: <span id="cpuCemeteryCount">0</span>장
            </button>
          </div>
          <div class="hp-box">CPU HP: <span id="cpuHp">4000</span></div>
        </div>
        <div class="hand-zone" id="cpuHand"></div>
        <div class="play-mat">
          <div class="card-slot" id="cpuFieldSpellZone">필드마법</div>
          <div class="card-slot" id="cpuMonsterZone">몬스터 존</div>
          <div class="card-slot" id="cpuSpellZone">마법 존</div>
        </div>
      </div>

      <div class="center-ui">
        <div class="turn-info">
          <div id="turnOwnerDisplay">Turn: 준비 중</div>
          <div style="font-size: 0.9rem; color: #ccc">
            Lv. 제한: <span id="levelLimitDisplay">1</span>
          </div>
        </div>
        <div class="log-box" id="gameLog"></div>
        <div>
          <button
            class="action-btn"
            id="btnEndTurn"
            onclick="endTurn()"
            style="display: none"
          >
            턴 종료
          </button>
          <button
            class="action-btn"
            id="btnSurrender"
            onclick="surrenderGame()"
            style="
              background: linear-gradient(135deg, #ff4444, #cc0000);
              color: white;
              box-shadow: 0 4px 15px rgba(204, 0, 0, 0.4);
            "
          >
            항복
          </button>
        </div>
      </div>

      <div class="player-area my-area">
        <div class="play-mat">
          <div class="card-slot" id="myFieldSpellZone">필드마법</div>
          <div class="card-slot" id="myMonsterZone">몬스터 존</div>
          <div class="card-slot" id="mySpellZone">마법 존</div>
        </div>
        <div class="hand-zone" id="myHand"></div>
        <div class="status-bar">
          <div class="hp-box">My Hp: <span id="myHp">4000</span></div>
          <div>
            내 Deck: <span id="myDeckCount">0</span>장 |
            <button
              onclick="openExtraDeck()"
              style="
                background: #0044cc;
                color: #fff;
                border: 1px solid #0088ff;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
                margin: 0 10px;
              "
            >
              엑스트라: <span id="myExtraDeckCount">0</span>장
            </button>
            <button
              onclick="openCemetery('USER')"
              style="
                background: #444444;
                color: #fff;
                border: 1px solid #777777;
                padding: 5px 10px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
              "
            >
              묘지:<span id="myCemeteryCount">0</span>장
            </button>
          </div>
        </div>
      </div>
    </div>
    <script th:src="@{/js/room.js}"></script>
  </body>
</html>

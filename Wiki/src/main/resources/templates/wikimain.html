<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유희왕 위키에 오신것을 환영합니다</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Noto Sans KR", sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .site-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #333;
        padding: 10px 30px;
        color: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      .logo-area a {
        display: flex;
        align-items: center;
        text-decoration: none;
        color: white;
        font-size: 24px;
        font-weight: bold;
      }
      .logo-img {
        height: 60px;
        margin-right: 10px;
      }
      .nav-menu {
        display: flex;
        gap: 20px;
      }
      .nav-item {
        color: #fff;
        text-decoration: none;
        font-weight: bold;
        padding: 8px 12px;
        border-radius: 4px;
        transition: 0.3s;
      }
      .nav-item:hover {
        background-color: #555;
        color: #ffcc00;
      }
      .main-banner {
        text-align: center;
        padding: 50px 20px;
        min-height: 80vh;
      }
      .banner-title {
        font-size: 2.5rem;
        color: #333;
        margin-bottom: 30px;
        font-weight: 800;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }
      .card-frame {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 15px;
        background: linear-gradient(45deg, #ffd700, #b8860b, #ffd700);
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }
      .card-frame.holo-effect {
        padding: 10px;
        background: linear-gradient(45deg, #ffd700, #b8860b, #ffd700);
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      }
      .featured-card-img {
        width: 100%;
        height: 100%;
        border-radius: 5px;
      }
      .holo-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 15px;
        background: linear-gradient(
          105deg,
          transparent 20%,
          rgba(255, 215, 0, 0.2) 25%,
          rgba(255, 0, 128, 0.1) 30%,
          rgba(0, 255, 255, 0.1) 35%,
          rgba(255, 215, 0, 0.2) 40%,
          transparent 45%
        );

        background-size: 200% 200%;
        opacity: 0.8;
        pointer-events: none;
        z-index: 2;
        animation: holo-shine 3s infinite linear;
      }
      @keyframes holo-shine {
        0% {
          background-position: 150% 0;
        }
        100% {
          background-position: -50% 0;
        }
      }
      .site-footer {
        background-color: #333;
        color: #333;
        padding: 40px 0;
        text-align: center;
        margin-top: auto;
      }
      .footer-links {
        margin-bottom: 20px;
      }
      .footer-links a {
        color: white;
        text-decoration: none;
        margin: 0 15px;
        font-size: 0.9rem;
      }
      .footer-links a :hover {
        color: #ffcc00;
        text-decoration: underline;
      }
      .copyright {
        font-size: 0.8rem;
        color: #777;
        line-height: 1.5;
      }
      .slider-track {
        display: flex;
        height: 100%;
        transition: transform 0.5s ease-in-out;
      }
      .slide-item {
        min-width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .card-info {
        text-align: center;
        margin-top: 20px;
        color: #333;
      }
      .slide-card-name {
        font-size: 1.5 rem;
        font-weight: bold;
        margin-bottom: 10px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
      }
      .rarity-badge {
        background: linear-gradient(45deg, #ffd700, #ff8c00);
        color: black;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 1rem;
        font-weight: bold;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      .slider-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        font-size: 2rem;
        padding: 10px;
        cursor: pointer;
        z-index: 20;
        border-radius: 50%;
      }
      .slider-btn:hover {
        background: rgba(0, 0, 0, 0.8);
      }
      .prev {
        left: 10px;
      }
      .next {
        right: 10px;
      }
      .deck-display-wrapper {
        position: relative;
        width: 500px;
        height: 700px;
        margin: 0 auto;
      }
      .deck-frame {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
      }
      .deck-frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .slider-container {
        position: absolute;
        z-index: 5;
        background-color: #1a1a1a;
        overflow: hidden;
        top: 23%;
        left: 18%;
        width: 67%;
        height: 76%;
      }
      .background-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }
      .bg-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="background-wrapper">
      <img th:src="@{/img/wiki-image.jpg}" alt="배경 이미지" class="bg-img" />
    </div>
    <header class="site-header">
      <div class="logo-area">
        <a th:href="@{/}"
          ><img
            th:src="@{/img/wiki_logo.webp}"
            alt="로고"
            class="logo-img"
          />WikiMain</a
        >
      </div>
      <nav class="nav-menu">
        <a th:href="@{/game/select}" class="nav-item">! 듀얼 시작 !</a>
        <a th:href="@{/board/list}" class="nav-item">게시판</a>
        <a th:href="@{showme/selectAll}" class="nav-item">전체 카드 확인</a>
        <a th:href="@{showme/search}" class="nav-item">카드 검색</a>
        <a th:href="@{/deck/build}" class="nav-item">덱 구성해보기</a>
        <a th:href="@{/user/mypage}" class="nav-item">마이페이지</a>
      </nav>
    </header>
    <main class="main-banner">
      <div class="deck-display-wrapper">
        <div class="deck-frame">
          <img
            th:src="@{/img/frame.png}"
            alt="덱 프레임"
            onerror="this.style.display = 'none'"
          />
        </div>
        <div class="slider-container">
          <div class="slider-track" id="sliderTrack">
            <div class="slide-item" th:each="card : ${rareCards}">
              <a
                th:href="@{/showme/searchResult(cardname=${card.cardname})}"
                class="card-link"
              >
                <div class="card-frame holo-effect">
                  <img
                    th:src="${card.cardNumber != null} ? |https://images.ygoprodeck.com/images/cards/${card.cardNumber}.jpg| : @{/img/card_back.png}"
                    th:alt="${card.cardname}"
                    class="featured-card-img"
                  />
                  <div class="holo-overlay"></div>
                </div>
              </a>
              <div class="card-info">
                <p class="slide-card-name" th:text="${card.cardname}">
                  카드이름
                </p>
                <span class="rarity-badge" th:text="${card.rarity}"
                  >레어도</span
                >
              </div>
            </div>
          </div>

          <button class="slider-btn prev" onclick="moveSlide(-1)">
            &#10094;
          </button>
          <button class="slider-btn next" onclick="moveSlide(1)">
            &#10095;
          </button>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <div class="container">
        <div class="footer-links">
          <a th:herf="@{/}">프로젝트 소개</a>
          <a th:herf="@{/}">이용약관</a>
          <a th:herf="@{/}">개인정보처리방침</a>
        </div>

        <div class="copyright">
          <p>&copy; 2026 Boosterpack Wiki Project. All rights reserved</p>
          <p>
            이 사이트는 포트폴리오 용도로 제작되었으며 Yu-Gi-Oh!의 모든 이미지
            저작권은 Konami에 있습니다.
          </p>
        </div>
      </div>
    </footer>
    <script>
      let currentIndex = 0;
      let slideInterval;

      window.onload = function () {
        startSlide();
      };

      function startSlide() {
        slideInterval = setInterval(() => {
          moveSlide(1);
        }, 3000);
      }

      function stopSlide() {
        clearInterval(slideInterval);
      }

      function moveSlide(direction) {
        const track = document.getElementById("sliderTrack");
        const totalSlides = track.children.length;

        if (totalSlides === 0) return;

        currentIndex += direction;

        if (currentIndex < 0) {
          currentIndex = totalSlides - 1;
        } else if (currentIndex >= totalSlides) {
          currentIndex = 0;
        }

        const offset = -currentIndex * 100;
        track.style.transform = `translateX(${offset}%)`;

        stopSlide();
        startSlide();
      }
    </script>
  </body>
</html>

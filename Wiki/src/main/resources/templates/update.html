<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수정</title>
    <link rel="stylesheet" th:href="@{/css/update.css}" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
  </head>
  </head>
  <body>
    <header class="site-header">
      <div class="logo-area">
        <a th:href="@{/}"
          ><img
             th:src="@{/img/wiki_logo.webp}"
            alt="로고"
            class="logo-img"
          />WikiMain</a
        >
      </div>
      <nav class="nav-menu">
        <a th:href="@{/game/select}" class="nav-item">! 듀얼 시작 !</a>
        <a th:href="@{/board/list}" class="nav-item">게시판</a>
        <a th:href="@{/showme/selectAll}" class="nav-item">전체 카드 확인</a>
        <a th:href="@{/showme/search}" class="nav-item">카드 검색</a>
        <a th:href="@{/deck/build}" class="nav-item">덱 구성해보기</a>
        <a th:href="@{/user/mypage}" class="nav-item">마이페이지</a>
      </nav>
    </header>
    <main class="board-container">
      <div class="write-body">
        <div class="board-header">
        <h2>게시글 수정</h2>
        </div>
      
        <form
        th:action="@{/board/update}"
        method="post"
        enctype="multipart/form-data"
        class="write-form">
      
          <input type="hidden" name="boardId" th:value="${board.boardId}" />

          <div id="deleteFileContainer"></div>
          <div class="form-group">
          <label>제목</label>
          <input
            type="text"
            name="title"
            class="input-title"
            th:value="${board.title}"
            required
          />
        </div>
        <div class="form-group">
          <label>내용</label>
          <textarea
            name="content"
            id="summernote"
            class="input-content"
            th:utext="${board.content}"
          ></textarea>
        </div>
        <div class="form-group" th:if="${board.fileList != null and !board.fileList.isEmpty()}">
          <label>첨부파일 변경 (삭제 시 x 클릭)</label>
          <div class="existing-file-container">
            <div th:each="file: ${board.fileList}" th:id="'file-item-' + ${file.fileId}" class="file-item">
                <th:block th:if="${#strings.endsWith(#strings.toLowerCase(file.savedName), '.mp4')
                                or #strings.endsWith(#strings.toLowerCase(file.savedName), '.webm')}">
                            <video class="preview-media" th:src="@{|/board/file/${file.savedName}|}"></video>
                </th:block>

                <th:block th:unless="${#strings.endsWith(#strings.toLowerCase(file.savedName),'.mp4')
                                    or #strings.endsWith(#strings.toLowerCase(file.savedName), '.webm')}">
                    <img class="preview-media" th:src="@{|/board/file/${file.savedName}|}">
                </th:block>

                <button type="button" class="delete-btn-x" th:onclick="markFileForDelete([[${file.fileId}]])">X</button>
                <div style="font-size: 12px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">[[${file.originalName}]]</div>
            </div>
          </div>
        </div>

        <div class="form-group file-group">
            <label for="uploadFile" class="file-label">새로운 파일 추가</label>
            <input type="file" name="uploadFile" multiple id="uploadFile" accept="image/*, video/*" class="input-file">
        </div>

        <div class="btn-area">
            <button type="submit" class="submit-btn">수정 완료</button>
            <a href="javascript:history.back()" class="cancel-btn">취소</a>
        </div>
        </form> 
      </div>

      <div class="card-widget">
        <h3>카드 도감</h3>
        <input
          type="text"
          id="cardSearch"
          placeholder="카드 이름 검색은 여기에"
          onkeyup="filterCards()"
        />
        <div id="cardListContainer" class="widget-card-grid">
          <div
            th:each="card : ${cardList}"
            class="widget-card-item"
            th:onmousedown="addCardImage([[${card.cardname}]], [[${card.cardNumber}]]); event.preventDefault();"
            th:title="${card.cardname}"
          >
            <img
              th:src="@{|https://images.ygoprodeck.com/images/cards/${card.cardNumber}.jpg|}"
              class="widget-card-img"
              th:onerror="|this.src='@{/img/card_back.png}'|"
              alt="카드"
            />
            <div class="widget-card-info">
              <div class="widget-card-name" th:text="${card.cardname}">
                카드이름
              </div>
              <div
                class="widget-card-stats"
                th:if="${card.atk != null and card.atk != ''}"
              >
                <span class="stat-atk" th:text="|ATK ${card.atk}|">ATK</span>
                <span class="stat-def" th:text="|DEF ${card.def}|">DEF</span>
              </div>
            </div>
            <div class="click-overlay">ADD</div>
          </div>
        </div>
      </div>

        
    </main>
    <footer class="site-footer">
      <div class="container">
        <div class="copyright">
          <p>&copy; 2026 BoosterPack Wiki Project. All rights reserved.</p>
        </div>
      </div>
    </footer>
    <script>
        function markFileForDelete(fileId){
            if(!confirm("이 파일을 삭제 목록에 추가하시겠습니까? (수정완료시 삭제됩니다)")){
                return;
            }
            const itemDiv = document.getElementById('file-item-' + fileId);
            itemDiv.style.display = 'none';

            const container = document.getElementById('deleteFileContainer');
            const input = document.createElement('input');

            input.type = 'hidden';
            input.name = 'deleteFileIdList';
            input.value = fileId;

            container.appendChild(input);
        }
        $(document).ready(function () {
        $("#summernote").summernote({
          height: 400,
          lang: "ko-KR",
          placeholder: "내용을 입력하고, 오른쪽에서 카드를 클릭해보세요!",
          toolbar: [
            ["style", ["bold", "italic", "underline", "clear"]],
            ["insert", ["picture", "link"]],
            ["view", ["codeview"]],
          ],
        });
      });
        function addCardImage(cardname, cardNumber) {
        const imgSrc = cardNumber
          ? `https://images.ygoprodeck.com/images/cards/${cardNumber}.jpg`
          : "/img/card_back.png";
        const imgTag = `<img src="${imgSrc}" style="width:150px; margin:10px;" alt="${cardname}">`;

        $("#summernote").summernote("insertImage", imgSrc, function ($image) {
          $image.css("width", "150px");
          $image.attr("alt", cardname);
          $image.addClass("inserted-card-img");
        });
      }
      function filterCards() {
        const input = document.getElementById("cardSearch");
        const filter = input.value.toUpperCase();
        const items = document.getElementsByClassName("widget-card-item");

        for (let i = 0; i < items.length; i++) {
          const nameElement =
            items[i].getElementsByClassName("widget-card-name")[0];
          const nameText = nameElement.textContent || nameElement.innerText;

          if (nameText.toUpperCase().indexOf(filter) > -1) {
            items[i].style.display = "";
          } else {
            items[i].style.display = "none";
          }
        }
      }
    </script>
  </body>
</html>

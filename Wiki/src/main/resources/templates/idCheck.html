<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아이디 중복 확인</title>
    <style>
      body {
        background-color: #f4f6f8;
        padding: 20px;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        box-sizing: border-box;
      }
      .container {
        background-color: white;
        width: 100%;
        max-width: 350px;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      h3 {
        margin: 0 0 20px 0;
        color: #333;
        font-size: 1.2rem;
      }
      form {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      input[type="text"] {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.2s;
      }
      input[type="text"]:focus {
        border-color: #4a90e2;
      }
      .search-btn {
        padding: 10px 15px;
        background-color: #6c757d;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        white-space: nowrap;
        transition: background-color 0.2s;
      }
      .search-btn:hover {
        background-color: #5a6268;
      }
      .result-box {
        margin-top: 10px;
        padding: 15px;
        background-color: #f8f9fa;
        border-radius: 8px;
        border: 1px solid #eee;
      }
      .result-text {
        margin: 0 0 15px 0;
        font-size: 1rem;
        line-height: 1.5;
        font-weight: 600;
      }
      .fail {
        color: #e74c3c;
      }
      .success {
        color: #27ae60;
      }
      .apply-btn {
        width: 100%;
        padding: 12px;
        background-color: #4a90e2;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .apply-btn:hover {
        background-color: #357abd;
      }
      .highlight {
        color: #333;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h3>아이디 중복 확인</h3>

      <form th:action="@{idCheck}" method="post">
        <input
          type="text"
          name="searchId"
          th:value="${searchId}"
          placeholder="아이디 입력"
          required
          autofocus
        />
        <button type="submit" class="search-btn">검색</button>
      </form>
      <div th:if="${checked}" class="result-box">
        <div th:if="${isDuplicate}">
          <p class="result-text fail">
            [<span class="highlight" th:text="${searchId}"></span>]은(는)
            <br />이미 사용중인 아이디입니다.
          </p>
        </div>
        <div th:unless="${isDuplicate}">
          <p class="result-text success">
            [<span class="highlight" th:text="${searchId}"></span
            >]은(는)<br />사용 가능합니다.
          </p>
          <button
            type="button"
            class="apply-btn"
            th:onclick="useId([[${searchId}]])"
          >
            적용
          </button>
        </div>
      </div>
    </div>
    <script>
      function useId(id) {
        opener.document.getElementById("memberId").value = id;
        opener.document.getElementById("memberId").readOnly = true;
        window.close();
      }
    </script>
  </body>
</html>
